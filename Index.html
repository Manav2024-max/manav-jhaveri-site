<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manav Jhaveri — Your Story Is Your Strategy</title>
  <meta name="description" content="I help founders turn who they are into what they're known for — building audience, authority, and inbound pipeline through LinkedIn." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&family=DM+Mono&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { background: #fdfcf9; -webkit-font-smoothing: antialiased; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:none; } }
    @keyframes heroIn { from { opacity:0; transform:translateY(24px); } to { opacity:1; transform:none; } }
    .concept { opacity:0; transform:translateY(40px); transition: opacity .8s cubic-bezier(.16,1,.3,1), transform .8s cubic-bezier(.16,1,.3,1); }
    .concept.visible { opacity:1; transform:none; }
    input[type=range] { -webkit-appearance:none; appearance:none; height:2px; background:#e0e0e0; border-radius:2px; outline:none; width:100%; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:18px; height:18px; border-radius:50%; background:#c9a96e; cursor:pointer; }
    input[type=range]::-moz-range-thumb { width:18px; height:18px; border-radius:50%; background:#c9a96e; cursor:pointer; border:none; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    const concepts = [
      { id:"story", number:"01", title:"Your Story Is The Asset", explanation:"Most founders think their product is the brand. It's not. You are. Your journey — the failures, the pivots, the moments of clarity — is the most differentiated content you'll ever produce. No competitor can copy it.", demo:"StoryDemo", stat:"3.2×", statLabel:"more engagement on personal posts vs company posts" },
      { id:"narrative", number:"02", title:"Narrative Architecture", explanation:"A great LinkedIn presence isn't a stream of posts. It's a story with a spine. Origin → Struggle → Insight → Vision. When readers can feel the arc, they follow. They trust. They buy.", demo:"NarrativeDemo", stat:"72%", statLabel:"of buyers research founders on LinkedIn before signing" },
      { id:"content", number:"03", title:"Content As Compounding Capital", explanation:"A post you write today will be read tomorrow, next month, next year. Unlike ads, content doesn't expire — it compounds. Every insight you share is an asset that keeps working while you sleep.", demo:"CompoundDemo", stat:"10×", statLabel:"average reach of a founder post vs a company page post" },
      { id:"voice", number:"04", title:"Voice Is Your Moat", explanation:"Anyone can share industry news. Only you can share your specific perspective, in your specific words, from your specific vantage point. That distinctiveness — your voice — is impossible to replicate and impossible to out-spend.", demo:"VoiceDemo", stat:"∞", statLabel:"competitors you'll never have for being authentically you" },
      { id:"presence", number:"05", title:"Presence Creates Opportunity", explanation:"Inbound is the dream. The right investors, customers, and partners finding you — not the other way around. A consistent LinkedIn presence puts you in the room before the meeting is even scheduled.", demo:"PresenceDemo", stat:"68%", statLabel:"of inbound deals start with 'I've been following you for a while'" },
    ];
    const demoBox = { background:"#fafafa", border:"1px solid #ebebeb", borderRadius:14, padding:"26px 28px", marginTop:24 };
    const demoLabel = { margin:"0 0 16px", fontSize:13, color:"#999", fontFamily:"'DM Sans', sans-serif", letterSpacing:"0.02em" };
    const btn = { padding:"10px 22px", borderRadius:8, border:"none", background:"#111", color:"#fff", fontFamily:"'DM Sans', sans-serif", fontSize:14, cursor:"pointer", fontWeight:500, letterSpacing:"0.02em", transition:"all .25s" };
    function StoryDemo() {
      const [active, setActive] = useState(null);
      const posts = [
        { type:"Company", icon:"🏢", text:"We're excited to announce our Series A funding round of $4M!", likes:42, comments:6 },
        { type:"Founder", icon:"👤", text:"We almost ran out of runway last April. Here's the decision that saved us — and what I'd tell every founder facing the same moment.", likes:847, comments:134 },
      ];
      return (
        <div style={demoBox}>
          <p style={demoLabel}>Which post would you stop scrolling for?</p>
          <div style={{ display:"flex", gap:16, flexWrap:"wrap" }}>
            {posts.map((p,i) => (
              <div key={i} onClick={() => setActive(i)} style={{ flex:1, minWidth:220, padding:"18px 20px", borderRadius:12, border:`2px solid ${active===i?"#c9a96e":"#ebebeb"}`, background:active===i?"#fdf8f0":"#fafafa", cursor:"pointer", transition:"all .25s" }}>
                <div style={{ fontSize:11, color:"#aaa", letterSpacing:"0.12em", marginBottom:8, fontFamily:"'DM Sans', sans-serif" }}>{p.icon} {p.type} post</div>
                <p style={{ fontSize:14, color:"#333", lineHeight:1.6, fontFamily:"'DM Sans', sans-serif", marginBottom:14 }}>{p.text}</p>
                <div style={{ display:"flex", gap:16, fontSize:13, color:"#999", fontFamily:"'DM Mono', monospace" }}>
                  <span>♥ {p.likes}</span><span>💬 {p.comments}</span>
                </div>
              </div>
            ))}
          </div>
          {active !== null && (
            <p style={{ marginTop:14, fontSize:13, color:"#c9a96e", fontFamily:"'DM Sans', sans-serif" }}>
              {active===1 ? "The founder post gets 20× more engagement. Your story is the strategy." : "The company post is forgettable. Announcements don't build trust — stories do."}
            </p>
          )}
        </div>
      );
    }
    function NarrativeDemo() {
      const [step, setStep] = useState(0);
      const arc = [
        { label:"Origin", color:"#e8f4e8", dot:"#6ab187", text:"Where did you come from? The moment before everything changed." },
        { label:"Struggle", color:"#f4e8e8", dot:"#c97b6a", text:"What almost stopped you? The obstacle that became the lesson." },
        { label:"Insight", color:"#f4f0e8", dot:"#c9a96e", text:"What did you discover? The idea that reframed everything." },
        { label:"Vision", color:"#e8eef4", dot:"#6a8fc9", text:"Where are you going? The future only you can see." },
      ];
      return (
        <div style={demoBox}>
          <p style={demoLabel}>The story arc every founder needs. Click each chapter.</p>
          <div style={{ display:"flex", gap:0, marginBottom:20, position:"relative" }}>
            <div style={{ position:"absolute", top:20, left:20, right:20, height:2, background:"#ebebeb", zIndex:0 }} />
            {arc.map((a,i) => (
              <div key={i} style={{ flex:1, textAlign:"center", position:"relative", zIndex:1, cursor:"pointer" }} onClick={() => setStep(i)}>
                <div style={{ width:40, height:40, borderRadius:"50%", background:step>=i?a.dot:"#e0e0e0", margin:"0 auto 8px", display:"flex", alignItems:"center", justifyContent:"center", fontSize:13, color:"#fff", fontWeight:600, fontFamily:"'DM Sans', sans-serif", transition:"all .3s", boxShadow:step===i?`0 0 0 4px ${a.dot}44`:"none" }}>{i+1}</div>
                <div style={{ fontSize:11, color:step>=i?"#333":"#bbb", fontFamily:"'DM Sans', sans-serif", fontWeight:500, letterSpacing:"0.06em" }}>{a.label}</div>
              </div>
            ))}
          </div>
          <div style={{ padding:"16px 20px", background:arc[step].color, borderRadius:10, fontSize:14, color:"#444", fontFamily:"'DM Sans', sans-serif", lineHeight:1.65 }}>
            <strong style={{ color:arc[step].dot }}>{arc[step].label}:</strong> {arc[step].text}
          </div>
        </div>
      );
    }
    function CompoundDemo() {
      const [months, setMonths] = useState(6);
      const posts = Math.round(months * 12);
      const reach = Math.round(posts * 1200 * (1 + months * 0.08));
      const fmt = n => n >= 1000000 ? (n/1000000).toFixed(1)+"M" : n >= 1000 ? (n/1000).toFixed(0)+"K" : n;
      return (
        <div style={demoBox}>
          <p style={demoLabel}>Drag to see how content compounds over time:</p>
          <div style={{ marginBottom:20 }}>
            <input type="range" min={1} max={24} value={months} onChange={e => setMonths(+e.target.value)} style={{ accentColor:"#c9a96e" }} />
            <div style={{ display:"flex", justifyContent:"space-between", fontSize:12, color:"#bbb", fontFamily:"'DM Mono', monospace", marginTop:4 }}>
              <span>1 month</span><span>24 months</span>
            </div>
          </div>
          <div style={{ display:"flex", gap:16, flexWrap:"wrap" }}>
            {[{ label:"Months consistent", value:months, unit:"mo" }, { label:"Posts published", value:posts, unit:"" }, { label:"Cumulative reach", value:fmt(reach), unit:"" }].map((s,i) => (
              <div key={i} style={{ flex:1, minWidth:100, padding:"16px", background:"#fdf8f0", borderRadius:10, textAlign:"center" }}>
                <div style={{ fontFamily:"'Cormorant Garamond', serif", fontSize:32, color:"#c9a96e", fontWeight:600 }}>{s.value}{s.unit}</div>
                <div style={{ fontFamily:"'DM Sans', sans-serif", fontSize:11, color:"#999", marginTop:4, letterSpacing:"0.05em" }}>{s.label}</div>
              </div>
            ))}
          </div>
        </div>
      );
    }
    function VoiceDemo() {
      const [selected, setSelected] = useState(null);
      const voices = [
        { label:"The Contrarian", example:"Everyone says to raise early. I think that's wrong — and here's what 3 failed rounds taught me.", color:"#f4e8e8", accent:"#c97b6a" },
        { label:"The Builder", example:"Week 14 of building in public. We broke $10K MRR. Here's exactly what worked and what didn't.", color:"#e8f0f4", accent:"#6a8fc9" },
        { label:"The Philosopher", example:"The best founders I know don't optimize for success. They optimize for learning. There's a difference.", color:"#f4f0e8", accent:"#c9a96e" },
      ];
      return (
        <div style={demoBox}>
          <p style={demoLabel}>Every founder has a voice. Which resonates with yours?</p>
          <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
            {voices.map((v,i) => (
              <div key={i} onClick={() => setSelected(i)} style={{ padding:"16px 20px", borderRadius:10, border:`2px solid ${selected===i?v.accent:"#ebebeb"}`, background:selected===i?v.color:"#fafafa", cursor:"pointer", transition:"all .2s" }}>
                <div style={{ fontFamily:"'DM Sans', sans-serif", fontSize:11, letterSpacing:"0.1em", color:v.accent, fontWeight:600, marginBottom:6 }}>{v.label}</div>
                <p style={{ fontFamily:"'DM Sans', sans-serif", fontSize:14, color:"#444", lineHeight:1.6, margin:0 }}>{v.example}</p>
              </div>
            ))}
          </div>
          {selected !== null && <p style={{ marginTop:14, fontSize:13, color:"#888", fontFamily:"'DM Sans', sans-serif" }}>Your voice is your moat. No AI, no ghostwriter, no competitor can replicate the specific way you see the world.</p>}
        </div>
      );
    }
    function PresenceDemo() {
      const [active, setActive] = useState(false);
      const [count, setCount] = useState(0);
      useEffect(() => {
        if (!active) { setCount(0); return; }
        if (count >= 5) return;
        const t = setTimeout(() => setCount(c => c+1), 600);
        return () => clearTimeout(t);
      }, [active, count]);
      const items = [
        { role:"Investor", text:"I've been following your posts for months — we'd love to connect." },
        { role:"Customer", text:"Your piece on founder burnout resonated. Can we talk about working together?" },
        { role:"Operator", text:"We need someone with your background on our advisory board." },
        { role:"Journalist", text:"Writing a piece on founder-led brands. Would you be a source?" },
        { role:"Partner", text:"Your audience perfectly aligns with ours. Collab?" },
      ];
      return (
        <div style={demoBox}>
          <p style={demoLabel}>What inbound looks like when you show up consistently:</p>
          <button style={{ ...btn, background:active?"#6ab187":"#111", marginBottom:20 }} onClick={() => { setActive(true); setCount(0); }}>
            {active ? "Inbound arriving..." : "Start posting consistently →"}
          </button>
          <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
            {items.slice(0,count).map((item,i) => (
              <div key={i} style={{ display:"flex", gap:12, alignItems:"flex-start", padding:"12px 16px", background:"#fafafa", borderRadius:10, border:"1px solid #f0f0f0" }}>
                <div style={{ width:8, height:8, borderRadius:"50%", background:"#6ab187", marginTop:5, flexShrink:0 }} />
                <div>
                  <div style={{ fontFamily:"'DM Sans', sans-serif", fontSize:11, color:"#aaa", letterSpacing:"0.08em", marginBottom:3 }}>{item.role}</div>
                  <div style={{ fontFamily:"'DM Sans', sans-serif", fontSize:13, color:"#444", lineHeight:1.5 }}>"{item.text}"</div>
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    }
    const demoMap = { StoryDemo, NarrativeDemo, CompoundDemo, VoiceDemo, PresenceDemo };
    function App() {
      const [visible, setVisible] = useState({});
      const refs = useRef({});
      useEffect(() => {
        const observers = concepts.map(c => {
          const el = refs.current[c.id];
          if (!el) return null;
          const obs = new IntersectionObserver(([entry]) => { if (entry.isIntersecting) setVisible(v => ({ ...v, [c.id]:true })); }, { threshold:0.1 });
          obs.observe(el);
          return obs;
        });
        return () => observers.forEach(o => o?.disconnect());
      }, []);
      return (
        <>
          <div style={{ maxWidth:760, margin:"0 auto", padding:"0 28px 140px" }}>
            <nav style={{ padding:"32px 0 0", display:"flex", justifyContent:"space-between", alignItems:"center", animation:"heroIn .6s ease both" }}>
              <span style={{ fontFamily:"'DM Mono', monospace", fontSize:11, color:"#bbb", letterSpacing:"0.16em" }}>MANAV JHAVERI</span>
              <a href="https://linkedin.com/in/manavjhaveri" style={{ fontFamily:"'DM Sans', sans-serif", fontSize:12, color:"#c9a96e", textDecoration:"none", letterSpacing:"0.08em", borderBottom:"1px solid #c9a96e44", paddingBottom:1 }}>LinkedIn →</a>
            </nav>
            <div style={{ padding:"100px 0 96px" }}>
              <div style={{ animation:"heroIn .8s .1s ease both", opacity:0 }}>
                <p style={{ fontFamily:"'DM Sans', sans-serif", fontSize:12, letterSpacing:"0.2em", color:"#c9a96e", textTransform:"uppercase", marginBottom:28 }}>Personal Branding for Founders</p>
              </div>
              <div style={{ animation:"heroIn .8s .2s ease both", opacity:0 }}>
                <h1 style={{ fontFamily:"'Cormorant Garamond', serif", fontSize:"clamp(48px, 8vw, 80px)", fontWeight:300, color:"#111", lineHeight:1.05, letterSpacing:"-0.02em", marginBottom:32 }}>
                  Your story is<br /><em style={{ fontStyle:"italic", color:"#c9a96e" }}>your strategy.</em>
                </h1>
              </div>
              <div style={{ animation:"heroIn .8s .35s ease both", opacity:0 }}>
                <p style={{ fontFamily:"'DM Sans', sans-serif", fontSize:17, color:"#666", lineHeight:1.8, maxWidth:520, fontWeight:300 }}>
                  I help founders turn who they are into what they're known for — building an audience, authority, and inbound pipeline through LinkedIn.
                </p>
              </div>
              <div style={{ animation:"heroIn .8s .5s ease both", opacity:0, marginTop:48, display:"flex", alignItems:"center", gap:24 }}>
                <div style={{ width:48, height:1, background:"#c9a96e" }} />
                <span style={{ fontFamily:"'DM Sans', sans-serif", fontSize:13, color:"#aaa", letterSpacing:"0.08em" }}>Five ideas that will change how you show up</span>
              </div>
            </div>
            <div style={{ borderTop:"1px solid #ebebeb", marginBottom:96 }} />
            {concepts.map((c, idx) => {
              const Demo = demoMap[c.demo];
              return (
                <div key={c.id} ref={el => refs.current[c.id] = el} className={`concept${visible[c.id]?" visible":""}`} style={{ marginBottom:96, transitionDelay:`${idx*0.05}s` }}>
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:24 }}>
                    <span style={{ fontFamily:"'DM Mono', monospace", fontSize:11, color:"#ddd", letterSpacing:"0.12em" }}>{c.number}</span>
                    <div style={{ textAlign:"right" }}>
                      <div style={{ fontFamily:"'Cormorant Garamond', serif", fontSize:28, color:"#c9a96e", fontWeight:600 }}>{c.stat}</div>
                      <div style={{ fontFamily:"'DM Sans', sans-serif", fontSize:10, color:"#bbb", maxWidth:180, lineHeight:1.5, letterSpacing:"0.04em" }}>{c.statLabel}</div>
                    </div>
                  </div>
                  <h2 style={{ fontFamily:"'Cormorant Garamond', serif", fontSize:"clamp(26px, 4vw, 36px)", fontWeight:400, color:"#111", lineHeight:1.2, marginBottom:18, letterSpacing:"-0.01em" }}>{c.title}</h2>
                  <p style={{ fontFamily:"'DM Sans', sans-serif", fontSize:16, color:"#555", lineHeight:1.85, maxWidth:580, fontWeight:300 }}>{c.explanation}</p>
                  <Demo />
                  {idx < concepts.length-1 && <div style={{ borderTop:"1px solid #f0f0f0", marginTop:96 }} />}
                </div>
              );
            })}
            <div style={{ padding:"100px 0 0", borderTop:"1px solid #ebebeb" }}>
              <p style={{ fontFamily:"'DM Sans', sans-serif", fontSize:12, letterSpacing:"0.2em", color:"#c9a96e", textTransform:"uppercase", marginBottom:28 }}>The Offer</p>
              <h3 style={{ fontFamily:"'Cormorant Garamond', serif", fontSize:"clamp(36px, 6vw, 60px)", fontWeight:300, color:"#111", lineHeight:1.05, letterSpacing:"-0.02em", marginBottom:24 }}>
                Done-for-you LinkedIn,<br /><em style={{ fontStyle:"italic", color:"#c9a96e" }}>flat $700/month.</em>
              </h3>
              <p style={{ fontFamily:"'DM Sans', sans-serif", fontSize:16, color:"#666", lineHeight:1.85, maxWidth:520, fontWeight:300, marginBottom:56 }}>
                No retainers with 12 line items. No agencies. Just one founder-focused operator who handles your entire LinkedIn presence — end to end.
              </p>
              <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit, minmax(220px, 1fr))", gap:16, marginBottom:56 }}>
                {[
                  { icon:"✍️", title:"16–20 posts/month", desc:"High-quality content written in your voice. Hooks, stories, insights — built to perform." },
                  { icon:"💬", title:"Engagement strategy", desc:"We handle comments, replies, and conversations that grow your presence organically." },
                  { icon:"🎯", title:"Prospecting support", desc:"Identify the right people. Start the right conversations. Turn followers into pipeline." },
                  { icon:"📥", title:"Conversation handling", desc:"Warm DMs, follow-ups, and relationship-building — so you stay focused on building." },
                ].map((item,i) => (
                  <div key={i} style={{ padding:"24px 24px 28px", borderRadius:14, border:"1px solid #ebebeb", background:"#fafafa" }}>
                    <div style={{ fontSize:22, marginBottom:12 }}>{item.icon}</div>
                    <div style={{ fontFamily:"'Cormorant Garamond', serif", fontSize:18, fontWeight:400, color:"#111", marginBottom:8 }}>{item.title}</div>
                    <div style={{ fontFamily:"'DM Sans', sans-serif", fontSize:13, color:"#888", lineHeight:1.65, fontWeight:300 }}>{item.desc}</div>
                  </div>
                ))}
              </div>
              <div style={{ background:"#111", borderRadius:20, padding:"48px 44px", display:"flex", flexDirection:"column", gap:32, marginBottom:24 }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", flexWrap:"wrap", gap:24 }}>
                  <div>
                    <div style={{ fontFamily:"'Cormorant Garamond', serif", fontSize:"clamp(48px, 8vw, 72px)", fontWeight:300, color:"#fff", lineHeight:1, letterSpacing:"-0.02em" }}>
                      $700<span style={{ fontSize:"clamp(16px, 2vw, 22px)", color:"#c9a96e", fontWeight:300, marginLeft:8 }}>/month</span>
                    </div>
                    <div style={{ fontFamily:"'DM Sans', sans-serif", fontSize:13, color:"#666", marginTop:8, letterSpacing:"0.06em" }}>FLAT RATE — NO SURPRISES</div>
                  </div>
                  <div style={{ padding:"10px 18px", borderRadius:100, border:"1px solid #333", fontFamily:"'DM Sans', sans-serif", fontSize:12, color:"#888", letterSpacing:"0.1em" }}>APPLICATION ONLY</div>
                </div>
                <div style={{ borderTop:"1px solid #222", paddingTop:28, display:"flex", flexDirection:"column", gap:12 }}>
                  {["16–20 founder posts crafted monthly","Full engagement & comment strategy","Prospecting: identify & initiate conversations","DM handling & warm outreach support","Monthly strategy call to align direction","One point of contact — no account managers"].map((item,i) => (
                    <div key={i} style={{ display:"flex", gap:12, alignItems:"flex-start" }}>
                      <div style={{ width:6, height:6, borderRadius:"50%", background:"#c9a96e", marginTop:6, flexShrink:0 }} />
                      <span style={{ fontFamily:"'DM Sans', sans-serif", fontSize:14, color:"#aaa", fontWeight:300, lineHeight:1.5 }}>{item}</span>
                    </div>
                  ))}
                </div>
                <a href="mailto:Manavjhaveri2000@gmail.com?subject=Application%20to%20Work%20Together&body=Hi%20Manav%2C%0A%0AI%27d%20like%20to%20apply%20to%20work%20with%20you%20on%20my%20LinkedIn%20presence.%0A%0AHere%27s%20a%20bit%20about%20me%20and%20what%20I%27m%20building%3A%0A%0A"
                  style={{ display:"inline-flex", alignItems:"center", gap:12, padding:"16px 32px", borderRadius:10, background:"#c9a96e", color:"#111", fontFamily:"'DM Sans', sans-serif", fontSize:15, fontWeight:500, textDecoration:"none", letterSpacing:"0.02em", alignSelf:"flex-start" }}>
                  Apply to work with Manav <span style={{ fontSize:18 }}>→</span>
                </a>
              </div>
              <p style={{ fontFamily:"'DM Sans', sans-serif", fontSize:13, color:"#bbb", lineHeight:1.7, paddingBottom:80 }}>
                Spots are limited. Applications reviewed within 48 hours. If it's a fit, you'll hear back directly from Manav.
              </p>
            </div>
          </div>
        </>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
